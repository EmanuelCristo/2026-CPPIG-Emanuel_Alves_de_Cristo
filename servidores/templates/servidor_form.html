{% extends 'index.html' %}
{% load django_bootstrap5 %}
{% block content %}
  <h3 class="text-center">Cadastro de Servidor</h3>
  <form method="POST" enctype="multipart/form-data">
    <div class="card shadow m-3 col-md-6 mx-auto">
      <div class="card">
        <div class="card-body">
          {% csrf_token %}
          {% bootstrap_form form %}
          {% if object.foto.url is not empty %}
          <div class="col-2">
            <img src="{{ object.foto.url }}" class="img-thumbnail" width="100" heigth="100" alt=""/>
          </div>
          {% endif %}
          <div class="text-end">
            {% bootstrap_button button_type="submit" content="Salvar" %}
            <a href="{% url 'servidores' %}" class="btn btn-secondary text-white" type="buton">
              <span class="text">Cancelar</span>
            </a>
          </div>
        </div>
      </div>
    </div>
  </form>
{% endblock %}
