{% extends 'index.html' %}
{% load static %}
{% block content %}
  <section class="section">
    <div class="container">
      <form action="" method="GET">
        <div class="form-group row p-3">
          <label class="col-sm-2 col-from-label">Nome da Sala: </label>
          <div class="col-sm-8">
            <input class="form-control" type="text" name="buscar" value="{{ request.GET.buscar }}"
                  placeholder="Digite o nome da Sala">
          </div>
          <div class="col-sm-2">
            <button type="submit" class="btn btn-primary">
              Buscar
            </button>
          </div>
        </div>
      </form>
      {% if object_list %}
        <div class="card-body">
          <h3 class="text-center">Salas Cadastradas</h3>
          <div class="table-responsive">
            <table class="table table-hover">
              <thead class="table-primary">
                <th>Nome</th>
                <th>Tipo</th>
                <th>Anexo</th>
              </thead>
              <tbody>
              {% for sala in object_list %}
                <tr>
                  <td>{{ sala.nome }}</td>
                  <td>{{ sala.tipo }}</td>
                  <td>{{ sala.anexo }}</td>
                </tr>
              {% endfor %}
              </tbody>
            </table>
          </div>
        </div>
      {% endif %}
    </div>
  </section>
{% endblock %}
