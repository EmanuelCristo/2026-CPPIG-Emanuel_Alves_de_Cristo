{% extends 'index.html' %}
{% load django_bootstrap5 %}
{% block content %}
  <h3 class="text-center">Cadastro de Sala</h3>
  <form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    {% bootstrap_form form %}
    <div class="text-end">
      {% bootstrap_button button_type="submit" content="Salvar" %}
      <a href="{% url 'salas' %}" class="btn btn-secondary text-white" type="buton">
        <span class="text">Cancelar</span>
      </a>
    </div>
  </form>
{% endblock %}
