{% extends 'index.html' %}
{% load static %}
{% load django_bootstrap5 %}
{% block content %}
  <section class="section">
    <div class="container">
      <form action="" method="GET">
        <div class="form-group row p-3">
          <label class="col-sm-2 col-from-label">Nome do Aluno: </label>
          <div class="col-sm-8">
            <input class="form-control" type="text" name="buscar" value="{{ request.GET.buscar }}"
                  placeholder="Digite o nome do Aluno">
          </div>
          <div class="col-sm-2">
            <button type="submit" class="btn btn-primary">
              Buscar
            </button>
          </div>
        </div>
      </form>
      {% if object_list %}
        <div class="card-body">
          <h3 class="text-center">Alunos Cadastrados</h3>
          <div class="table-responsive">
            <table class="table table-hover">
              <thead class="table-primary">
                <th>Nome</th>
                <th>Email</th>
                <th>Matrícula</th>
                <th style="width: 100px; text-align: center">Ações</th>
              </thead>
              <tbody>
              {% for aluno in object_list %}
                <tr>
                  <td> <a href="#" data-bs-toggle="modal" data-bs-target="#modal{{aluno.id}}">
                          {{ aluno.nome }} </a>
                  </td>
                  <td>{{ aluno.email }}</td>
                  <td>{{ aluno.matricula }}</td>
                  <td style="text-align: center">
                    <a href="{% url 'aluno_editar' aluno.pk %}">
                      <span class="icon">
                       <i class="bi bi-pencil-fill"></i>
                      </span>
                    </a>
                    <a href="{% url 'aluno_apagar' aluno.pk %}">
                      <span class="icon">
                        <i class="bi bi-trash-fill"></i>
                      </span>
                    </a>
                  </td>
                </tr>
              {% endfor %}
              </tbody>
            </table>
          </div>
        </div>
      {% endif %}
    </div>
  </section>
{% endblock %}
